<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SportChallenge</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#0f172a" />
</head>
<body>
  <main class="appShell">
    <section class="contentPanel" aria-label="SportChallenge App">
      <aside id="workoutTicker" class="workoutTicker" aria-labelledby="workoutTickerTitle">
        <div class="tickerHeader">
          <span class="tickerLiveDot" aria-hidden="true"></span>
          <h1 id="workoutTickerTitle">Live Trainings</h1>
        </div>
        <ul id="workoutTickerList" class="tickerList"></ul>
      </aside>

      <p id="statusMessage" class="status" role="status">Firebase wird initialisiert ...</p>

      <section id="loginBox" class="card authCard" aria-labelledby="loginTitle">
        <div class="sectionHeader">
          <p class="eyebrow">Willkommen zurück</p>
          <h2 id="loginTitle">Einloggen oder starten</h2>
        </div>
        <label for="email">E-Mail</label>
        <input id="email" type="email" placeholder="name@example.com" autocomplete="email" />
        <label for="password">Passwort</label>
        <input id="password" type="password" placeholder="Mindestens 6 Zeichen" autocomplete="current-password" />
        <div class="buttonRow">
          <button id="loginBtn" class="primaryBtn">Einloggen</button>
          <button id="registerBtn" class="secondaryBtn">Registrieren</button>
        </div>
      </section>

      <section id="appBox" class="dashboard" hidden>
        <div class="dashboardTop card">
          <div>
            <p class="eyebrow">Aktive Session</p>
            <p id="userInfo" class="userInfo"></p>
          </div>
          <button id="logoutBtn" class="ghostBtn">Ausloggen</button>
        </div>

        <section class="card formCard" aria-labelledby="workoutTitle">
          <div class="sectionHeader">
            <p class="eyebrow">Heute erledigt?</p>
            <h2 id="workoutTitle">Training eintragen</h2>
          </div>

          <div class="formGrid">
            <div class="fieldGroup fullWidth">
              <label for="exercise">Übung</label>
              <select id="exercise">
                <option>Liegestütze</option>
                <option>Kniebeugen</option>
                <option>Plank</option>
                <option>Joggen</option>
              </select>
            </div>

            <div class="fieldGroup">
              <label for="value">Wert</label>
              <input id="value" type="number" placeholder="z. B. 25" min="0" />
            </div>

            <div class="fieldGroup">
              <label for="unit">Einheit</label>
              <select id="unit">
                <option>Wiederholungen</option>
                <option>Sekunden</option>
                <option>Minuten</option>
                <option>Kilometer</option>
              </select>
            </div>
          </div>

          <button id="saveWorkoutBtn" class="primaryBtn">Training speichern</button>
        </section>

        <section class="dashboardGrid">
          <section class="card" aria-labelledby="historyTitle">
            <div class="sectionHeader inlineHeader">
              <div>
                <p class="eyebrow">Timeline</p>
                <h2 id="historyTitle">Verlauf</h2>
              </div>
            </div>
            <div id="workoutList" class="workoutList"></div>
          </section>

          <aside class="card statsCard" aria-labelledby="statsTitle">
            <div class="sectionHeader">
              <p class="eyebrow">Fortschritt</p>
              <h2 id="statsTitle">Statistik</h2>
            </div>
            <div class="statsControls" aria-label="Statistik Zeitraum">
              <label for="statsRange">Zeitraum</label>
              <select id="statsRange">
                <option value="week">Diese Woche</option>
                <option value="last7">Letzte 7 Tage</option>
                <option value="month">Dieser Monat</option>
                <option value="last30">Letzte 30 Tage</option>
                <option value="all">Alles</option>
                <option value="custom">Variabel</option>
              </select>
              <div id="customRange" class="customRange" hidden>
                <div class="fieldGroup">
                  <label for="statsFrom">Von</label>
                  <input id="statsFrom" type="date" />
                </div>
                <div class="fieldGroup">
                  <label for="statsTo">Bis</label>
                  <input id="statsTo" type="date" />
                </div>
              </div>
            </div>
            <p id="stats" class="statsValue"></p>
            <div class="radarPanel" aria-labelledby="radarTitle">
              <div class="radarHeader">
                <h3 id="radarTitle">Spinnendiagramm</h3>
                <p id="radarSummary" class="radarSummary">Noch keine Daten im gewählten Zeitraum.</p>
              </div>
              <svg id="radarChart" class="radarChart" viewBox="0 0 240 240" role="img" aria-labelledby="radarTitle radarSummary"></svg>
              <div id="radarLegend" class="radarLegend"></div>
            </div>
            <button id="enablePushBtn" class="secondaryBtn">Push erlauben</button>
          </aside>
        </section>
      </section>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
